name: The Long News daily scan

on:
  schedule:
    # 11:00 UTC = 7:00 AM New York in summer, 6:00 AM in winter.
    - cron: "0 11 * * *"
  workflow_dispatch: # lets you run it manually from the Actions tab

permissions:
  contents: write # lets the workflow commit each day's edition to /docs

jobs:
  scan-and-email:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests

      - name: Run the scan, send the edition, build the page
        run: python scan_and_email.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}

      - name: Publish to the web
        run: |
          git config user.name "long-news-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs
          git commit -m "Edition of $(date -u +%F)" || echo "Nothing new to publish"
          git push
